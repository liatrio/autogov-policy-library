name: Policy Library Workflow

on:
  workflow_dispatch:
  push:
    branches: ['**']
    paths-ignore:
      - .github/workflows/wf-slack-alert.yaml
      - README.md
      - renovate.json
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

env:
  OPA_VERSION: 1.2.0
  REGAL_VERSION: 0.37.0

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Regal
        uses: open-policy-agent/setup-regal@761188c3b435761fa254beca508a44875619648f # v2.0.0
        with:
          version: ${{ env.REGAL_VERSION }}
      - name: Run Regal lint
        run: regal lint --format github ./policies

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Check out repository code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup OPA
        uses: open-policy-agent/setup-opa@b2b258e089860efaadaaf71bf6e3aecb4a3eeff1 # v2.4.0
        with:
          version: ${{ env.OPA_VERSION }}
      - name: Run OPA Tests
        run: opa test -v -s ./schemas ./policies/
      - name: Check OPA Policies
        run: opa check --rego-v1 --v1-compatible -s schemas ./policies

  build-image:
    if: github.event.pull_request.draft == false
    needs: test
    permissions:
      id-token: write
      attestations: write
      packages: write
      contents: write
      actions: read
      artifact-metadata: write
    uses: liatrio/autogov-workflows/.github/workflows/rw-build-image.yaml@dc57f72515396f86fe248e66951822dccb8ad785 # v0.21.3
    secrets: inherit
    with:
      subject-name: ${{ github.repository }}
      registry: ghcr.io
      cert-identity: https://github.com/liatrio/autogov-workflows/.github/workflows/rw-attest-image.yaml@dc57f72515396f86fe248e66951822dccb8ad785 # v0.21.3

  build-blob-offline: #blob
    if: github.event.pull_request.draft == false
    needs: test
    permissions:
      id-token: write
      attestations: write
      contents: write
      actions: read
      artifact-metadata: write
    # FOLLOW-UP: the .rego version-comment mutation is wired in a separate PR,
    # after the enabler (liatrio/autogov-workflows#339,
    # ci/forward-mutations-config) is merged + tagged. That follow-up bumps this
    # ref (and the cert-identity ref below) to the new tagged SHA and adds
    # `mutations-config: .autogov-release.yaml` here. The current v0.21.0 ref does
    # NOT declare a mutations-config input, and GitHub Actions fails a reusable
    # workflow call that passes an undeclared input — so it is intentionally
    # omitted until the ref is bumped. The .autogov-release.yaml file lands now so
    # the rules are reviewed alongside this change.
    uses: liatrio/autogov-workflows/.github/workflows/rw-build-blob-offline.yaml@dc57f72515396f86fe248e66951822dccb8ad785 # v0.21.3
    secrets: inherit
    with:
      subject-path: |
        bundle.tar.gz
        schemas.tar.gz
      cert-identity: https://github.com/liatrio/autogov-workflows/.github/workflows/rw-attest-blob-offline.yaml@dc57f72515396f86fe248e66951822dccb8ad785 # v0.21.3
      autogov-version: v0.23.0
