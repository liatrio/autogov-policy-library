name: Policy Library Workflow

on:
  workflow_dispatch:
  push:
    branches: ['**']
    paths-ignore:
      - .github/workflows/wf-slack-alert.yaml
      - README.md
      - renovate.json
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

env:
  OPA_VERSION: 1.17.1
  REGAL_VERSION: 0.39.0

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Regal
        uses: open-policy-agent/setup-regal@761188c3b435761fa254beca508a44875619648f # v2.0.0
        with:
          version: ${{ env.REGAL_VERSION }}
      - name: Run Regal lint
        run: regal lint --format github ./policies

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Check out repository code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup OPA
        uses: open-policy-agent/setup-opa@b2b258e089860efaadaaf71bf6e3aecb4a3eeff1 # v2.4.0
        with:
          version: ${{ env.OPA_VERSION }}
      - name: Run OPA Tests
        run: opa test -v -s ./schemas ./policies/
      - name: Check OPA Policies
        run: opa check --rego-v1 --v1-compatible -s schemas ./policies
      - name: Check release mutation config
        run: |
          fail=0
          paths="$(grep -E '^[[:space:]]+- path:' .autogov-release.yaml | sed -E 's/.*path:[[:space:]]*"?([^"]+)"?[[:space:]]*$/\1/' | sort)"
          # every rule path must resolve to a real file carrying a version comment
          while IFS= read -r p; do
            [ -f "$p" ] || { echo "missing file: $p"; fail=1; continue; }
            grep -qE '^#  version: ' "$p" || { echo "no version comment: $p"; fail=1; }
          done <<< "$paths"
          # every versioned policy file must be covered by a rule
          while IFS= read -r f; do
            grep -qE '^#  version: ' "$f" || continue
            grep -qxF "$f" <<< "$paths" || { echo "uncovered file: $f"; fail=1; }
          done < <(find policies -name '*.rego' ! -name '*_test.rego' | sort)
          [ "$fail" -eq 0 ]

  build-image:
    if: github.event.pull_request.draft == false
    needs: test
    permissions:
      id-token: write
      attestations: write
      packages: write
      contents: write
      actions: read
      pull-requests: read
      artifact-metadata: write
    uses: liatrio/autogov-workflows/.github/workflows/rw-build-image.yaml@d22e76e51373fb7adda39a47752bbda5c80c2ec4 # v0.26.0
    secrets: inherit
    with:
      subject-name: ${{ github.repository }}
      registry: ghcr.io
      cert-identity: https://github.com/liatrio/autogov-workflows/.github/workflows/rw-attest-image.yaml@0b11d6945f138fd1b4c6372f9c94381ace120b88 # v0.23.0

  build-blob-offline: #blob
    if: github.event.pull_request.draft == false
    needs: test
    permissions:
      id-token: write
      attestations: write
      contents: write
      actions: read
      artifact-metadata: write
    uses: liatrio/autogov-workflows/.github/workflows/rw-build-blob-offline.yaml@d22e76e51373fb7adda39a47752bbda5c80c2ec4 # v0.26.0
    secrets: inherit
    with:
      subject-path: |
        bundle.tar.gz
        schemas.tar.gz
      cert-identity: https://github.com/liatrio/autogov-workflows/.github/workflows/rw-attest-blob-offline.yaml@0b11d6945f138fd1b4c6372f9c94381ace120b88 # v0.23.0
      autogov-version: v0.29.8
      mutations-config: .autogov-release.yaml
