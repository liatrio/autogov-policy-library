name: Policy Library Workflow

on:
  workflow_dispatch:
  push:
    branches: ['**']
    paths-ignore:
      - .github/workflows/wf-slack-alert.yaml
      - README.md
      - catalog-info.yaml
      - renovate.json
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

env:
  OPA_VERSION: 1.2.0
  REGAL_VERSION: 0.31.1

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
      - name: Setup Regal
        uses: StyraInc/setup-regal@33a142b1189004e0f14bf42b15972c67eecce776 # v1.0
        with:
          version: ${{ env.REGAL_VERSION }}
      - name: Run Regal lint
        run: regal lint --format github ./policies

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Check out repository code
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
      - name: Setup OPA
        uses: open-policy-agent/setup-opa@34a30e8a924d1b03ce2cf7abe97250bbb1f332b5 #v2.2.0
        with:
          version: ${{ env.OPA_VERSION }}
      - name: Run OPA Tests
        run: opa test -v -s ./schemas ./policies/
      - name: Check OPA Policies
        run: opa check --rego-v1 --v1-compatible -s schemas ./policies

  attest-image-hp:
    if: github.event.pull_request.draft == false
    needs: test
    permissions:
      id-token: write
      attestations: write
      packages: write
      contents: write
      actions: read
    uses: liatrio/liatrio-gh-autogov-workflows/.github/workflows/rw-hp-build-image.yaml@7a72d60dc48a629cac6670eef6634682db4f5d79 # v0.12.3
    secrets: inherit
    with:
      subject-name: ${{ github.repository }}
      registry: ghcr.io
      cert-identity: https://github.com/liatrio/liatrio-gh-autogov-workflows/.github/workflows/rw-hp-attest-image.yaml@7a72d60dc48a629cac6670eef6634682db4f5d79 # v0.12.3

  attest-blob-lp: #blob
    if: github.event.pull_request.draft == false
    needs: test
    permissions:
      id-token: write
      attestations: write
      packages: read
      contents: write
      actions: read
    uses: liatrio/liatrio-gh-autogov-workflows/.github/workflows/rw-lp-build-blob.yaml@7a72d60dc48a629cac6670eef6634682db4f5d79 # v0.12.3
    secrets: inherit
    with:
      subject-path: |
        bundle.tar.gz
        schemas.tar.gz
      cert-identity: https://github.com/liatrio/liatrio-gh-autogov-workflows/.github/workflows/rw-lp-attest-blob.yaml@7a72d60dc48a629cac6670eef6634682db4f5d79 # v0.12.3
