name: Policy Library Workflow

on:
  workflow_dispatch:
  push:
    branches: ['**']
    paths-ignore:
      - .github/workflows/wf-slack-alert.yaml
      - README.md
      - catalog-info.yaml
      - renovate.json
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

env:
  OPA_VERSION: 1.2.0
  REGAL_VERSION: 0.37.0

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - name: Setup Regal
        uses: StyraInc/setup-regal@33a142b1189004e0f14bf42b15972c67eecce776 # v1.0
        with:
          version: ${{ env.REGAL_VERSION }}
      - name: Run Regal lint
        run: regal lint --format github ./policies

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Check out repository code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - name: Setup OPA
        uses: open-policy-agent/setup-opa@950f159a49aa91f9323f36f1de81c7f6b5de9576 # v2.3.0
        with:
          version: ${{ env.OPA_VERSION }}
      - name: Run OPA Tests
        run: opa test -v -s ./schemas ./policies/
      - name: Check OPA Policies
        run: opa check --rego-v1 --v1-compatible -s schemas ./policies

  build-image:
    if: github.event.pull_request.draft == false
    needs: test
    permissions:
      id-token: write
      attestations: write
      packages: write
      contents: write
      actions: read
      artifact-metadata: write
    uses: liatrio/liatrio-gh-autogov-workflows/.github/workflows/rw-build-image.yaml@35800755dc2fa13162d6cfb9c7844eb934843918 # v0.21.0
    secrets: inherit
    with:
      subject-name: ${{ github.repository }}
      registry: ghcr.io
      cert-identity: https://github.com/liatrio/liatrio-gh-autogov-workflows/.github/workflows/rw-attest-image.yaml@35800755dc2fa13162d6cfb9c7844eb934843918 # v0.21.0

  build-blob-offline: #blob
    if: github.event.pull_request.draft == false
    needs: test
    permissions:
      id-token: write
      attestations: write
      contents: write
      actions: read
      artifact-metadata: write
    uses: liatrio/liatrio-gh-autogov-workflows/.github/workflows/rw-build-blob-offline.yaml@35800755dc2fa13162d6cfb9c7844eb934843918 # v0.21.0
    secrets: inherit
    with:
      subject-path: |
        bundle.tar.gz
        schemas.tar.gz
      cert-identity: https://github.com/liatrio/liatrio-gh-autogov-workflows/.github/workflows/rw-attest-blob-offline.yaml@35800755dc2fa13162d6cfb9c7844eb934843918 # v0.21.0
