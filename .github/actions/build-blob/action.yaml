name: Build Bundle Composite Action

description: >-
  A composite action that is placed in ./.github/actions/build-image/action.yaml whereby
  ./.github/workflows/rw-<permissions_path>-attest-image.yaml will trigger this action to build an image. The steps
  can be adjusted per the users need just as long as the output is the image digest.

inputs:
  subject-name:
    description: The name for the image.
    required: true
    default: ghcr.io/${{ github.repository }}
  opa-version:
    description: The version of OPA to use.
    required: false
    default: "1.2.0"
outputs:
  bundle-path:
    description: The path to the generated bundle file.
    value: "bundle.tar.gz"
  schemas-path:
    description: The path to the generated schemas archive.
    value: "schemas.tar.gz"

runs:
  using: composite
  steps:
    - name: Get Next Semantic Release Tag # premptively tags pushed/registry image w/ release tag
      id: semantic-release
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: go-semantic-release/action@2e9dc4247a6004f8377781bef4cb9dad273a741f # v1.24.1
      with:
        dry: true
        allow-initial-development-versions: true
        github-token: ${{ github.token }}
    - name: Check out repository code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
    - name: Setup OPA
      uses: open-policy-agent/setup-opa@34a30e8a924d1b03ce2cf7abe97250bbb1f332b5 #v2.2.0
      with:
        version: ${{ inputs.opa-version }}
    - name: Build OPA Bundle
      shell: bash
      run: |
        opa \
          build \
          --bundle ./policies \
          --ignore "*_test.rego" \
          --output bundle.tar.gz
    - name: Create Schemas Archive
      shell: bash
      run: |
        tar -czf schemas.tar.gz -C schemas .