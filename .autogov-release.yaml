    replace: '#  version: ${version}'
    global: true
  - path: "policies/security/dependency_vulnerability/critical/critical.rego"
    type: regexReplace
    field: '#  version: .*'
    replace: '#  version: ${version}'
    global: true
  - path: "policies/security/dependency_vulnerability/high/high.rego"
    type: regexReplace
    field: '#  version: .*'
    replace: '#  version: ${version}'
    global: true
  - path: "policies/security/dependency_vulnerability/medium/medium.rego"
    type: regexReplace
    field: '#  version: .*'
    replace: '#  version: ${version}'
    global: true
  - path: "policies/security/dependency_vulnerability/low/low.rego"
    type: regexReplace
    field: '#  version: .*'
    replace: '#  version: ${version}'
    global: true
  - path: "policies/vulnerability_thresholds/vulnerability_thresholds.rego"
    type: regexReplace
    field: '#  version: .*'
    replace: '#  version: ${version}'
    global: true
  - path: "policies/code_scan_config/code_scan_config.rego"
    type: regexReplace
    field: '#  version: .*'
    replace: '#  version: ${version}'
    global: true
  - path: "policies/security/code_scan/code_scan.rego"
